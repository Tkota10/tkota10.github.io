name: Regenerate photos manifest

on:
  push:
    paths:
      - "Photos/**"
      - "!Photos/manifest.json"

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/generate-photos-manifest.js
      - name: Commit manifest if changed
        run: |
          if ! git diff --quiet Photos/manifest.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Photos/manifest.json
            git commit -m "Regenerate photos manifest"
            git push
          fi
