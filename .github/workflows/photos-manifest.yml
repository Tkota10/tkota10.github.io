name: Optimize photos and regenerate manifest

on:
  push:
    paths:
      - "Photos/**"
      - "!Photos/manifest.json"

permissions:
  contents: write

jobs:
  photos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compress oversized photos
        run: |
          # Shrink any photo over 700KB to max 1800px on the long edge.
          # Already-compressed photos fall under the threshold and are skipped,
          # so this only ever touches newly added originals.
          find Photos -type f -size +700k \
            \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
            -exec mogrify -auto-orient -resize '1800x1800>' -quality 82 {} +
      - run: node scripts/generate-photos-manifest.js
      - name: Commit changes if any
        run: |
          if ! git diff --quiet Photos/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Photos/
            git commit -m "Optimize photos and regenerate manifest"
            git push
          fi
